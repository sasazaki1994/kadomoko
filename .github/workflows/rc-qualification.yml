name: RC Qualification

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, commit, or tag to qualify'
        required: true
        default: main
        type: string
      artifact-retention-days:
        description: 'Artifact retention days'
        required: true
        default: '14'
        type: string
      run-e2e:
        description: 'Run Electron E2E smoke tests'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  windows-rc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - shell: pwsh
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $short = (git rev-parse --short=7 HEAD).Trim()
          "APP_VERSION=$($pkg.version)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SHORT_SHA=$short" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RC_SOURCE_REF=$env:INPUT_REF" | Out-File -FilePath $env:GITHUB_ENV -Append
      - run: npm ci
      - if: ${{ inputs.run-e2e }}
        run: npm run release:check:win
      - if: ${{ !inputs.run-e2e }}
        run: npm run release:check:win -- --skip-e2e
      - name: Upload release readiness report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: kadomoco-rc-release-readiness-${{ github.run_id }}
          retention-days: ${{ fromJSON(inputs.artifact-retention-days) }}
          path: |
            artifacts/release-readiness.json
            artifacts/release-readiness.md
          if-no-files-found: warn
      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          Get-ChildItem -Path 'release/KadoMoco-*.exe', 'release/KadoMoco-*.zip' | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLower())  $($_.Name)" | Set-Content -Encoding ascii "$($_.FullName).sha256"
          }
      - name: Create RC manifest
        shell: pwsh
        env:
          RC_SOURCE_REF: ${{ inputs.ref }}
          RC_SPRITE_VALIDATION: pass
          RC_ICON_VALIDATION: pass
          RC_LICENSE_NOTICE_VALIDATION: pass
          RC_UNIT_TEST_STATUS: pass
          RC_E2E_STATUS: ${{ inputs.run-e2e && 'pass' || 'not-run' }}
          RC_PACKAGE_VERIFICATION_STATUS: pass
          RC_CODE_SIGNING_STATUS: not-recorded
        run: npm run manifest:rc
      - name: Copy QA templates
        shell: pwsh
        run: Copy-Item docs/qa/windows-rc-result-template.md release/windows-rc-result-template.md
      - uses: actions/upload-artifact@v4
        with:
          name: kadomoco-windows-rc-${{ env.APP_VERSION }}-${{ env.SHORT_SHA }}
          retention-days: ${{ fromJSON(inputs.artifact-retention-days) }}
          if-no-files-found: error
          path: |
            release/KadoMoco-*.exe
            release/KadoMoco-*.zip
            release/KadoMoco-*.sha256
            release/rc-manifest.json
            release/windows-rc-result-template.md
            artifacts/release-readiness.json
            artifacts/release-readiness.md
