name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  linux-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Electron GUI runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libatk1.0-0 libatk-bridge2.0-0 libcups2 libgtk-3-0 libnss3 libxss1 libasound2t64
      - name: Unified release readiness gate with Electron E2E
        run: xvfb-run --auto-servernum npm run release:check -- --include-e2e
      - name: Upload release readiness report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: kadomoco-release-readiness-linux
          path: |
            artifacts/release-readiness.json
            artifacts/release-readiness.md
          if-no-files-found: warn

  windows-quality-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run release:check:win
      - name: Upload release readiness report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: kadomoco-release-readiness-windows
          path: |
            artifacts/release-readiness.json
            artifacts/release-readiness.md
          if-no-files-found: warn
      - uses: actions/upload-artifact@v4
        with:
          name: kadomoco-windows-0.1.0
          path: |
            release/KadoMoco-*.exe
            release/KadoMoco-*.zip
            artifacts/release-readiness.json
            artifacts/release-readiness.md
          if-no-files-found: error
