name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  windows-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run package:win
      - name: Check artifacts
        shell: pwsh
        run: |
          if (-not (Get-ChildItem release -Recurse -Include *.exe,*.zip)) { throw 'No Windows artifacts found' }
      - uses: actions/upload-artifact@v4
        with:
          name: kadomoco-windows
          path: release/**
