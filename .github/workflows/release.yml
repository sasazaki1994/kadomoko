name: Draft Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to validate and draft, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: read

jobs:
  windows-draft-release:
    runs-on: windows-latest
    permissions:
      contents: write # required only for this job's draft GitHub Release and asset upload
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run release:check:win -- --release-tag $env:RELEASE_TAG
      - name: Upload release readiness report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: kadomoco-draft-release-readiness-${{ github.run_id }}
          path: |
            artifacts/release-readiness.json
            artifacts/release-readiness.md
          if-no-files-found: warn
      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          Get-ChildItem -Path 'release/KadoMoco-*.exe', 'release/KadoMoco-*.zip' | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLower())  $($_.Name)" | Set-Content -Encoding ascii "$($_.FullName).sha256"
          }
      - name: Create draft release and upload assets
        shell: pwsh
        run: |
          gh release create $env:RELEASE_TAG `
            --draft `
            --title "KadoMoco $env:RELEASE_TAG" `
            --notes-file docs/release-notes-v0.1.0.md `
            release/KadoMoco-*.exe `
            release/KadoMoco-*.zip `
            release/KadoMoco-*.sha256 `
            artifacts/release-readiness.json `
            artifacts/release-readiness.md
